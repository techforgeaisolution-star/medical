{# Risk Predictor + Probabilistic Graph Panel #}

<div class="risk-panel">
  <div class="risk-panel-header">
    <span class="rp-title">Risk Analysis</span>
    <span class="risk-badge risk-badge--{{ risk_color }}">{{ risk_level }} Risk</span>
  </div>

  <!-- Animated Gauge -->
  <div class="gauge-wrap">
    <svg class="gauge-svg" viewBox="0 0 220 130" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="arcGradient" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#10c97a"/>
          <stop offset="45%"  stop-color="#f59e0b"/>
          <stop offset="100%" stop-color="#f04e42"/>
        </linearGradient>
      </defs>
      <!-- BG arc -->
      <path d="M 20 110 A 90 90 0 0 1 200 110" fill="none" stroke="#e8edf7" stroke-width="16" stroke-linecap="round"/>
      <!-- Color gradient arc (full) -->
      <path d="M 20 110 A 90 90 0 0 1 200 110" fill="none" stroke="url(#arcGradient)" stroke-width="16" stroke-linecap="round" opacity="0.25"/>
      <!-- Dynamic filled arc -->
      <path id="gauge-fill" fill="none" stroke-width="16" stroke-linecap="round"/>
      <!-- Needle -->
      <line id="gauge-needle" x1="110" y1="110" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="110" cy="110" r="6" fill="white" stroke="#c8d0e8" stroke-width="2"/>
      <!-- Labels -->
      <text x="14"  y="126" fill="#8892b0" font-size="9" font-family="Plus Jakarta Sans,sans-serif">0%</text>
      <text x="100" y="14"  fill="#8892b0" font-size="9" font-family="Plus Jakarta Sans,sans-serif" text-anchor="middle">50%</text>
      <text x="205" y="126" fill="#8892b0" font-size="9" font-family="Plus Jakarta Sans,sans-serif" text-anchor="end">100%</text>
    </svg>
    <div class="gauge-value" id="gauge-value">0%</div>
    <div class="gauge-label">{{ disease }} Risk Score</div>
  </div>

  <!-- Factor Bar Chart -->
  <div class="factor-chart">
    <div class="fc-title">Key Risk Factors</div>
    {% for f in factors %}
    <div class="fc-row">
      <span class="fc-label">{{ f.label }}</span>
      <div class="fc-bar-bg">
        <div class="fc-bar" data-value="{{ f.value }}" style="width:0%"></div>
      </div>
      <span class="fc-pct">{{ f.value }}%</span>
    </div>
    {% endfor %}
  </div>

  <!-- Probability Distribution -->
  <div class="fc-title" style="margin-top:1.5rem;">Probability Distribution</div>
  <div class="prob-chart-wrap">
    <canvas id="probChart" height="110"></canvas>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
(function(){
  const RISK = {{ risk_prob }};
  const colorMap = { high:"#f04e42", moderate:"#f59e0b", low:"#10c97a" };
  const RISK_COLOR = colorMap["{{ risk_color }}"];

  /* ── Gauge ── */
  function angleForPct(pct) { return Math.PI + (pct / 100) * Math.PI; }
  function polarToXY(angle, r=90, cx=110, cy=110) {
    return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
  }
  function buildArc(pct) {
    const start = { x: 20, y: 110 };
    const end   = polarToXY(angleForPct(pct));
    const large = pct > 50 ? 1 : 0;
    return `M ${start.x} ${start.y} A 90 90 0 ${large} 1 ${end.x.toFixed(2)} ${end.y.toFixed(2)}`;
  }

  const fillEl   = document.getElementById('gauge-fill');
  const needleEl = document.getElementById('gauge-needle');
  const valEl    = document.getElementById('gauge-value');

  const dur = 1300, t0 = performance.now();
  function animate(ts) {
    const e = Math.min((ts - t0) / dur, 1);
    const ease = 1 - Math.pow(1 - e, 3);
    const cur = ease * RISK;

    fillEl.setAttribute('d', buildArc(cur));
    fillEl.setAttribute('stroke', RISK_COLOR);

    const tip = polarToXY(angleForPct(cur), 80);
    needleEl.setAttribute('x2', tip.x.toFixed(2));
    needleEl.setAttribute('y2', tip.y.toFixed(2));
    needleEl.setAttribute('stroke', RISK_COLOR);

    valEl.textContent = cur.toFixed(1) + '%';
    valEl.style.color = RISK_COLOR;

    if (e < 1) requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);

  /* ── Factor bars ── */
  document.querySelectorAll('.fc-bar').forEach(bar => {
    const v = parseFloat(bar.dataset.value);
    setTimeout(() => {
      bar.style.transition = 'width 1.1s cubic-bezier(0.34,1.1,0.64,1)';
      bar.style.width = v + '%';
      const h = v < 40 ? 152 : v < 70 ? 38 : 4;
      const s = v < 40 ? 72 : 80;
      const l = v < 40 ? 46 : 52;
      bar.style.background = `hsl(${h},${s}%,${l}%)`;
    }, 250);
  });

  /* ── Bell curve chart ── */
  const ctx = document.getElementById('probChart').getContext('2d');
  const spread = 18;
  const labels = [], pts = [];
  for (let x = 0; x <= 100; x += 2) {
    labels.push(x);
    pts.push(Math.exp(-0.5 * Math.pow((x - RISK) / spread, 2)));
  }

  new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: pts,
        borderColor: RISK_COLOR,
        borderWidth: 2.5,
        backgroundColor: ctx => {
          const {ctx: c, chartArea} = ctx.chart;
          if (!chartArea) return 'transparent';
          const g = c.createLinearGradient(chartArea.left, chartArea.top, chartArea.left, chartArea.bottom);
          g.addColorStop(0, RISK_COLOR + '40');
          g.addColorStop(1, RISK_COLOR + '05');
          return g;
        },
        fill: true,
        tension: 0.5,
        pointRadius: 0,
      }]
    },
    options: {
      animation: { duration: 1200, easing: 'easeOutCubic' },
      plugins: { legend: { display: false },
        tooltip: { callbacks: {
          title: (i) => `Risk: ${i[0].label}%`,
          label: (i) => `Density: ${i.raw.toFixed(3)}`
        }}
      },
      scales: {
        x: {
          ticks: { color:'#8892b0', font:{size:9}, maxTicksLimit:6,
                   callback:(v,i) => labels[i] + '%' },
          grid: { color:'rgba(100,120,180,0.08)' }
        },
        y: { display:false }
      }
    },
    plugins: [{
      id: 'riskLine',
      afterDraw(chart) {
        const {ctx:c, chartArea, scales} = chart;
        const nearest = labels.reduce((a,b) => Math.abs(b-RISK) < Math.abs(a-RISK) ? b : a);
        const xPos = scales.x.getPixelForValue(labels.indexOf(nearest));
        c.save();
        c.strokeStyle = RISK_COLOR;
        c.lineWidth = 1.5;
        c.setLineDash([4,3]);
        c.beginPath();
        c.moveTo(xPos, chartArea.top);
        c.lineTo(xPos, chartArea.bottom);
        c.stroke();
        c.setLineDash([]);
        c.fillStyle = RISK_COLOR;
        c.font = 'bold 10px Plus Jakarta Sans, sans-serif';
        c.textAlign = 'center';
        c.fillText(RISK.toFixed(1)+'%', xPos, chartArea.top - 5);
        c.restore();
      }
    }]
  });
})();
</script>
